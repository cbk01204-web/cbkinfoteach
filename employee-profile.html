<!DOCTYPE html>
<html lang="en">
<head>
    <script src="js/suppress-warnings.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CBK INFOTECH HRMS - A professional, highly scalable Human Resource Management System.">
    <meta name="keywords" content="HRMS, HR, CBK INFOTECH, Employee Management, Payroll, Attendance">
    <meta name="author" content="CBK INFOTECH">
    <meta property="og:title" content="CBK INFOTECH HRMS">
    <meta property="og:description" content="Manage your workforce efficiently.">
    <title>My Profile - Employee - CBK INFOTECH</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/employee.css">
    <!-- Include admin.css for form and layout styles if needed -->
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous">
</head>
<body class="dashboard-page">
    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <img src="images/logo.jpg" alt="CBK Logo" class="brand-logo-img mr-2">
                <h2>CBK INFOTECH</h2>
            </div>
            
            <nav class="sidebar-menu">
                <a href="employee-dashboard.html" class="menu-item"><i class="fa-solid fa-border-all"></i> Dashboard</a>
                <a href="employee-profile.html" class="menu-item active"><i class="fa-solid fa-user"></i> Profile</a>
                <a href="employee-dashboard.html#attendance-section" class="menu-item"><i class="fa-solid fa-clock-rotate-left"></i> Attendance</a>
                <a href="employee-leaves.html" class="menu-item"><i class="fa-solid fa-bed"></i> Leaves</a>
                <a href="employee-payslips.html" class="menu-item"><i class="fa-solid fa-file-invoice-dollar"></i> Payslips</a>
            </nav>
            
            <div class="sidebar-footer">
                <a href="#" id="logout-btn" class="btn btn-outline" style="width: 100%; border-radius: 8px;">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i> Logout
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Navigation -->
            <header class="header">
                <div class="header-left">
                    <button class="mobile-menu-btn icon-btn" style="display: none;"><i class="fa-solid fa-bars"></i></button>
                    <div style="font-weight: 500; font-size: 1.125rem;">Profile Management</div>
                </div>
                
                <div class="header-right" style="display: flex; align-items: center;">
                    <!-- Notification Bell -->
                    <div class="notification-wrapper" id="notification-wrapper">
                        <button class="notification-bell" id="notification-bell">
                            <i class="fa-solid fa-bell"></i>
                            <span class="notification-badge" id="notification-badge">0</span>
                        </button>
                        <div class="notification-dropdown" id="notification-dropdown">
                            <div class="notification-header">
                                <span>Notifications</span>
                                <span style="font-size: 0.75rem; color: var(--primary); cursor: pointer;" id="mark-all-read">Mark all read</span>
                            </div>
                            <div class="notification-body" id="notification-list">
                                <div style="padding: 1rem; text-align: center; color: var(--text-muted);">Loading...</div>
                            </div>
                        </div>
                    </div>

                    <button id="theme-toggle" class="icon-btn" title="Toggle Dark/Light Mode">
                        <i class="fa-solid fa-moon"></i>
                    </button>
                    <div class="user-profile">
                        <div class="avatar" id="header-avatar" style="background: linear-gradient(135deg, #10b981, #34d399);"><i class="fa-solid fa-user"></i></div>
                        <div class="user-info">
                            <p id="header-name">Employee</p>
                            <span id="header-role">Loading...</span>
                        </div>
                    </div>
                </div>
            </header>

            <div class="content-wrapper">
                <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 2rem; align-items: start;">
                    
                    <!-- Profile Photo Card -->
                    <div class="table-card" style="text-align: center; padding: 2rem;">
                        <div style="position: relative; width: 150px; height: 150px; margin: 0 auto 1.5rem;">
                            <img loading="lazy" id="profile-preview" src="https://via.placeholder.com/150" alt="Profile Photo" style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%; border: 4px solid var(--primary); box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
                            
                            <!-- Hidden File Input -->
                            <input type="file" id="photo-upload" accept="image/*" style="display: none;">
                            
                            <button id="trigger-upload-btn" class="btn btn-primary" style="position: absolute; bottom: 0; right: 0; border-radius: 50%; width: 40px; height: 40px; padding: 0; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.2);">
                                <i class="fa-solid fa-camera"></i>
                            </button>
                        </div>
                        <h2 id="profile-name" style="margin-bottom: 0.25rem;">John Doe</h2>
                        <p id="profile-role" style="color: var(--text-muted); margin-bottom: 1rem;">Software Engineer</p>
                        
                        <div style="background: var(--bg-main); padding: 1rem; border-radius: 8px; text-align: left; margin-top: 2rem;">
                            <p style="margin-bottom: 0.5rem;"><i class="fa-solid fa-id-badge mr-2" style="width: 20px; color: var(--primary);"></i> <strong id="profile-id">EMP-1001</strong></p>
                            <p style="margin-bottom: 0.5rem;"><i class="fa-solid fa-building mr-2" style="width: 20px; color: var(--secondary);"></i> <strong id="profile-dept">Engineering</strong></p>
                            <p style="margin-bottom: 0;"><i class="fa-solid fa-envelope mr-2" style="width: 20px; color: var(--danger);"></i> <span id="profile-email">john@example.com</span></p>
                        </div>
                    </div>

                    <!-- Edit Forms -->
                    <div>
                        <!-- Personal Info -->
                        <div class="table-card" style="margin-bottom: 2rem;">
                            <div class="table-header">
                                <h3 style="margin:0;">Personal Information</h3>
                            </div>
                            <form id="personal-info-form">
                                <div class="form-row" style="margin-bottom: 1.5rem;">
                                    <div class="form-group">
                                        <label class="form-label">First Name</label>
                                        <input type="text" id="first-name" class="form-control" readonly style="background: var(--bg-main); cursor: not-allowed;">
                                    </div>
                                    <div class="form-group">
                                        <label class="form-label">Last Name</label>
                                        <input type="text" id="last-name" class="form-control" readonly style="background: var(--bg-main); cursor: not-allowed;">
                                    </div>
                                </div>
                                <div class="form-group" style="margin-bottom: 1.5rem;">
                                    <label class="form-label">Phone Number</label>
                                    <input type="tel" id="phone" class="form-control" placeholder="+1 (555) 000-0000" required>
                                </div>
                                <div class="form-group" style="margin-bottom: 1.5rem;">
                                    <label class="form-label">Home Address</label>
                                    <textarea id="address" class="form-control" rows="3" placeholder="Enter your full address..." required></textarea>
                                </div>
                                <div style="text-align: right;">
                                    <button type="submit" id="save-info-btn" class="btn btn-primary"><i class="fa-solid fa-save mr-2"></i> Save Changes</button>
                                </div>
                            </form>
                        </div>

                        <!-- Security -->
                        <div class="table-card">
                            <div class="table-header">
                                <h3 style="margin:0;">Security</h3>
                            </div>
                            <form id="security-form">
                                <div class="form-group" style="margin-bottom: 1.5rem;">
                                    <label class="form-label">New Password</label>
                                    <input type="password" id="new-password" class="form-control" required minlength="6">
                                </div>
                                <div class="form-group" style="margin-bottom: 1.5rem;">
                                    <label class="form-label">Confirm New Password</label>
                                    <input type="password" id="confirm-password" class="form-control" required minlength="6">
                                </div>
                                <div style="text-align: right;">
                                    <button type="submit" id="save-password-btn" class="btn btn-outline" style="color: var(--danger); border-color: var(--danger);"><i class="fa-solid fa-lock mr-2"></i> Update Password</button>
                                </div>
                            </form>
                        </div>
                    </div>

                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script type="module">
        import { checkAuthState, logoutUser } from './js/auth.js';
        import { initEmployeeProfile } from './js/employee-profile.js';
        import { initNotifications } from './js/notifications.js';
        import './js/app.js';

        const init = () => {
            initEmployeeProfile();
            initNotifications();
            
            // Handle Theme toggle
            const themeToggleBtn = document.getElementById('theme-toggle');
            if (themeToggleBtn) {
                const currentTheme = localStorage.getItem('theme');
                if (currentTheme === 'dark') {
                    document.body.classList.add('dark-theme');
                    themeToggleBtn.innerHTML = '<i class="fa-solid fa-sun"></i>';
                }
                themeToggleBtn.addEventListener('click', () => {
                    document.body.classList.toggle('dark-theme');
                    let theme = 'light';
                    if (document.body.classList.contains('dark-theme')) {
                        theme = 'dark';
                        themeToggleBtn.innerHTML = '<i class="fa-solid fa-sun"></i>';
                    } else {
                        themeToggleBtn.innerHTML = '<i class="fa-solid fa-moon"></i>';
                    }
                    localStorage.setItem('theme', theme);
                });
            }

            // Logout button
            const logoutBtn = document.getElementById('logout-btn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    logoutUser();
                });
            }
        };

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }

        // Protect route (non-blocking)
        checkAuthState('employee');
    </script>
</body>
</html>
