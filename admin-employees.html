<!DOCTYPE html>
<html lang="en">
<head>
    <script src="js/suppress-warnings.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CBK INFOTECH HRMS - A professional, highly scalable Human Resource Management System.">
    <meta name="keywords" content="HRMS, HR, CBK INFOTECH, Employee Management, Payroll, Attendance">
    <meta name="author" content="CBK INFOTECH">
    <meta property="og:title" content="CBK INFOTECH HRMS">
    <meta property="og:description" content="Manage your workforce efficiently.">
    <title>Employee Management - Admin - CBK INFOTECH</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous">
</head>
<body class="dashboard-page">
    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <img src="images/logo.jpg" alt="CBK Logo" class="brand-logo-img mr-2">
                <h2>CBK INFOTECH</h2>
            </div>
            
            <nav class="sidebar-menu">
                <a href="admin-dashboard.html" class="menu-item"><i class="fa-solid fa-border-all"></i> Dashboard</a>
                <a href="admin-employees.html" class="menu-item active"><i class="fa-solid fa-users"></i> Employees</a>
                <a href="admin-attendance.html" class="menu-item"><i class="fa-solid fa-clock-rotate-left"></i> Attendance</a>
                <a href="admin-leaves.html" class="menu-item"><i class="fa-solid fa-bed"></i> Leave Requests</a>
                <a href="admin-payroll.html" class="menu-item"><i class="fa-solid fa-money-check-dollar"></i> Payroll</a>
                <a href="admin-payslips.html" class="menu-item"><i class="fa-solid fa-file-invoice"></i> Payslips</a>
                <a href="admin-reports.html" class="menu-item"><i class="fa-solid fa-chart-pie"></i> Reports</a>
                <a href="admin-settings.html" class="menu-item"><i class="fa-solid fa-gear"></i> Settings</a>
                <a href="admin-departments.html" class="menu-item"><i class="fa-solid fa-building"></i> Departments</a>
            </nav>
            
            <div class="sidebar-footer">
                <a href="#" id="logout-btn" class="btn btn-outline" style="width: 100%; border-radius: 8px;">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i> Logout
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Navigation -->
            <header class="header">
                <div class="header-left">
                    <button class="mobile-menu-btn icon-btn" style="display: none;"><i class="fa-solid fa-bars"></i></button>
                    <div style="font-weight: 500; font-size: 1.125rem;">Employee Management</div>
                </div>
                
                <div class="header-right">
                    <button id="theme-toggle" class="icon-btn" title="Toggle Dark/Light Mode">
                        <i class="fa-solid fa-moon"></i>
                    </button>
                    <div class="user-profile">
                        <div class="avatar"><i class="fa-solid fa-user-tie"></i></div>
                        <div class="user-info">
                            <p>Admin User</p>
                            <span>HR Director</span>
                        </div>
                    </div>
                </div>
            </header>

            <div class="content-wrapper">
                <!-- Controls: Search, Filter, Add -->
                <div class="table-card" style="margin-bottom: 2rem;">
                    <div class="table-header" style="margin-bottom: 0;">
                        <div style="display: flex; gap: 1rem; flex: 1;">
                            <div class="search-bar" style="max-width: 300px; flex: 1;">
                                <i class="fa-solid fa-magnifying-glass" style="color: var(--text-muted);"></i>
                                <input type="text" id="search-input" placeholder="Search by name, ID, or email..." style="width: 100%;">
                            </div>
                            <select id="department-filter" class="form-control" style="width: auto; background: var(--bg-main);">
                                <option value="">All Departments</option>
                                <option value="Engineering">Engineering</option>
                                <option value="Marketing">Marketing</option>
                                <option value="Sales">Sales</option>
                                <option value="HR">HR</option>
                                <option value="Support">Support</option>
                            </select>
                        </div>
                        <button id="add-employee-btn" class="btn btn-primary"><i class="fa-solid fa-user-plus mr-2"></i> Add Employee</button>
                    </div>
                </div>

                <!-- Data Table -->
                <div class="table-card">
                    <div style="overflow-x: auto;">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Employee</th>
                                    <th>ID</th>
                                    <th>Contact</th>
                                    <th>Department</th>
                                    <th>Role</th>
                                    <th>Temp Password</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="employee-table-body">
                                <!-- Populated dynamically by JS -->
                                <tr>
                                    <td colspan="7" style="text-align: center; padding: 2rem;">
                                        <i class="fa-solid fa-circle-notch fa-spin"></i> Loading employees...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Add / Edit Modal -->
    <div id="employee-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Add New Employee</h2>
                <button id="close-modal-btn" class="close-modal"><i class="fa-solid fa-times"></i></button>
            </div>
            <form id="employee-form">
                <input type="hidden" id="emp-doc-id">
                
                <div class="photo-upload-wrapper">
                    <div class="photo-preview" id="photo-preview">
                        <i class="fa-solid fa-user text-muted" style="font-size: 2rem;"></i>
                    </div>
                    <div>
                        <label for="profile-photo" class="btn btn-outline" style="padding: 0.5rem 1rem; font-size: 0.875rem;">Upload Photo</label>
                        <input type="file" id="profile-photo" accept="image/*" style="display: none;">
                        <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: 0.25rem;">Max size 2MB</p>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">First Name</label>
                        <input type="text" id="first-name" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Last Name</label>
                        <input type="text" id="last-name" class="form-control" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" id="emp-email" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Phone Number</label>
                        <input type="text" id="emp-phone" class="form-control" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Department</label>
                        <select id="emp-dept" class="form-control" required>
                            <option value="">Select Department...</option>
                            <option value="Engineering">Engineering</option>
                            <option value="Marketing">Marketing</option>
                            <option value="Sales">Sales</option>
                            <option value="HR">HR</option>
                            <option value="Support">Support</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Role / Designation</label>
                        <input type="text" id="emp-role" class="form-control" required>
                    </div>
                </div>

                <div class="form-row" id="password-row">
                    <div class="form-group">
                        <label class="form-label">Temporary Password</label>
                        <div style="display: flex; gap: 0.5rem;">
                            <input type="text" id="emp-password" class="form-control" placeholder="Click Generate..." required>
                            <button type="button" id="generate-pwd-btn" class="btn btn-outline" style="padding: 0.55rem 0.75rem;" title="Auto-generate secure password">
                                <i class="fa-solid fa-key"></i> Generate
                            </button>
                        </div>
                    </div>
                </div>

                <div class="action-btns mt-3">
                    <button type="button" id="cancel-modal-btn" class="btn btn-outline">Cancel</button>
                    <button type="submit" id="save-employee-btn" class="btn btn-primary">Save Employee</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module">
        import { checkAuthState, logoutUser } from './js/auth.js';
        import { initEmployeeManagement } from './js/admin-employees.js';
        import './js/app.js';

        const init = () => {
            initEmployeeManagement();
            
            // Handle Theme toggle UI logic (can be abstracted later)
            const themeToggleBtn = document.getElementById('theme-toggle');
            if (themeToggleBtn) {
                const currentTheme = localStorage.getItem('theme');
                if (currentTheme === 'dark') {
                    document.body.classList.add('dark-theme');
                    themeToggleBtn.innerHTML = '<i class="fa-solid fa-sun"></i>';
                }
                themeToggleBtn.addEventListener('click', () => {
                    document.body.classList.toggle('dark-theme');
                    let theme = 'light';
                    if (document.body.classList.contains('dark-theme')) {
                        theme = 'dark';
                        themeToggleBtn.innerHTML = '<i class="fa-solid fa-sun"></i>';
                    } else {
                        themeToggleBtn.innerHTML = '<i class="fa-solid fa-moon"></i>';
                    }
                    localStorage.setItem('theme', theme);
                });
            }

            // Logout button
            const logoutBtn = document.getElementById('logout-btn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    logoutUser();
                });
            }
        };

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }

        // Protect route (non-blocking)
        checkAuthState('admin');
    </script>
</body>
</html>
